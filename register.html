<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - MediAssist AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;

background:linear-gradient(
135deg,
#0f172a,
#071d5b,
#1d004e,
#3d0421);

background-size:400% 400%;

animation:gradient 12s ease infinite;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;
transition:.4s;
}

body.light{
background:#f4f7fc;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Loader */

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.loader{
width:80px;
height:80px;
border:8px solid #444;
border-top:8px solid #00e5ff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

/* Floating Medical Icons */

.float{
position:fixed;
font-size:40px;
opacity:.25;
animation:float 6s infinite ease-in-out;
}

.f1{top:10%;left:5%;}
.f2{top:20%;right:8%;}
.f3{bottom:15%;left:10%;}
.f4{bottom:12%;right:10%;}

@keyframes float{
50%{
transform:translateY(-20px);
}
}

/* Theme Toggle */

.theme{
position:absolute;
top:20px;
right:20px;
font-size:25px;
cursor:pointer;
color:white;
}

/* Container */

.container{

width:1100px;
max-width:95%;

display:flex;
align-items:center;
justify-content:space-between;

background:rgba(255,255,255,.12);

backdrop-filter:blur(15px);

padding:40px;

border-radius:30px;

box-shadow:0 8px 40px rgba(0,0,0,.25);
}

/* Left */

.left{
width:50%;
color:white;
}

.left h1{
font-size:55px;
margin-bottom:15px;
}

.left p{
font-size:20px;
line-height:1.8;
}

/* Right */

.card{

width:400px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(15px);

padding:35px;

border-radius:25px;
}

.card h2{
text-align:center;
color:white;
margin-bottom:20px;
}

.input-group{
position:relative;
margin-bottom:15px;
}

input{

width:100%;

padding:15px;

border:none;

border-radius:12px;

outline:none;
}

.eye{
position:absolute;
right:15px;
top:15px;
cursor:pointer;
color:#555;
}

button{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:#4400ff;

font-weight:bold;

cursor:pointer;
}

button:hover{
background:#6400df00;
}

.link{
text-align:center;
margin-top:15px;
}

.link a{
color:white;
text-decoration:none;
}

.lottie{
margin-top:20px;
display:flex;
justify-content:center;
}

</style>

</head>

<body>

<div id="loader">
<div class="loader"></div>
</div>

<!-- Floating Icons -->

<div class="float f1">❤️</div>
<div class="float f2">🩺</div>
<div class="float f3">💊</div>
<div class="float f4">🧬</div>

<div class="theme" onclick="toggleTheme()">
🌙
</div>

<div class="container">

<div class="left" data-aos="fade-right">

<h1>MediAssist AI</h1>

<p>
Create your healthcare account and access
AI-powered symptom guidance, medicine reminders,
appointment support, and healthcare assistance.
</p>

<div class="lottie">

<lottie-player
src="https://assets2.lottiefiles.com/packages/lf20_q7yxm4lk.json"
background="transparent"
speed="1"
style="width:300px;height:300px"
loop
autoplay>
</lottie-player>

</div>

</div>

<div class="card" data-aos="fade-left">

<h2>Create Account</h2>

<form action="/register_user" method="POST">

<div class="input-group">

<input
type="text"
name="username"
placeholder="Username"
required>

</div>

<div class="input-group">

<input
type="email"
name="email"
placeholder="Email Address"
required>

</div>

<div class="input-group">

<input
type="password"
id="password"
name="password"
placeholder="Password"
required>

<i class="fas fa-eye eye"
onclick="togglePassword()"></i>

</div>

<button type="submit">
Register
</button>

</form>

<div class="link">

<a href="/login">
Already have an account? Login
</a>

</div>

</div>

</div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>

AOS.init();

window.onload=function(){

setTimeout(()=>{
document.getElementById("loader").style.display="none";
},1200);

}

function toggleTheme(){
document.body.classList.toggle("light");
}

function togglePassword(){

let p=document.getElementById("password");

if(p.type==="password"){
p.type="text";
}
else{
p.type="password";
}

}

</script>

</body>
</html>
