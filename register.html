<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MediAssist AI Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(
135deg,
#0f172a,
#071d5b,
#1d004e,
#890145);

background-size:400% 400%;
animation:gradient 12s ease infinite;

min-height:100vh;
color:white;
transition:.4s;
}

body.light{
background:#f4f7fc;
color:#111;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Floating Icons */

.float{
position:fixed;
font-size:40px;
opacity:.25;
animation:float 6s infinite ease-in-out;
}

.f1{top:10%;left:5%;}
.f2{top:20%;right:8%;}
.f3{bottom:15%;left:10%;}
.f4{bottom:12%;right:10%;}

@keyframes float{
50%{
transform:translateY(-20px);
}
}

/* Navbar */

nav{

display:flex;
justify-content:space-between;
align-items:center;

padding:20px 40px;

background:rgba(255,255,255,.1);

backdrop-filter:blur(15px);
}

.logo{
font-size:28px;
font-weight:bold;
}

.nav-right{
display:flex;
gap:20px;
align-items:center;
}

.theme{
cursor:pointer;
font-size:24px;
}

.logout{
text-decoration:none;
padding:10px 18px;
border-radius:10px;
background:#ff006e;
color:white;
}

/* Main Container */

.container{
width:95%;
max-width:1400px;
margin:auto;
padding:30px 0;
}

/* Statistics */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.stat-card{

background:rgba(255,255,255,.12);

backdrop-filter:blur(15px);

padding:25px;

border-radius:25px;

text-align:center;
}

.stat-card h2{
font-size:40px;
color:#00e5ff;
}

.stat-card i{
font-size:45px;
margin-bottom:15px;
}

/* Dashboard Grid */

.grid{

display:grid;
grid-template-columns:2fr 1fr;
gap:25px;
}

/* Chatbot */

.chat-card{

background:rgba(255,255,255,.12);

backdrop-filter:blur(15px);

border-radius:25px;

padding:25px;
}

.chat-box{

height:400px;

overflow-y:auto;

background:rgba(0,0,0,.15);

padding:15px;

border-radius:15px;

margin-bottom:15px;
}

.user{
background:#00e5ff;
color:black;
padding:10px;
border-radius:12px;
margin:10px 0;
text-align:right;
}

.bot{
background:white;
color:black;
padding:10px;
border-radius:12px;
margin:10px 0;
}

.chat-input{
display:flex;
gap:10px;
}

.chat-input input{
flex:1;
padding:15px;
border:none;
border-radius:12px;
}

.chat-input button{
padding:15px 25px;
border:none;
border-radius:12px;
background:#00e5ff;
cursor:pointer;
}

/* Sidebar */

.side-card{

background:rgba(255,255,255,.12);

backdrop-filter:blur(15px);

border-radius:25px;

padding:25px;

margin-bottom:20px;
}

.side-card h3{
margin-bottom:15px;
}

.side-card input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-bottom:10px;
}

.side-card button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#00e5ff;
cursor:pointer;
}

/* Voice Button */

.voice{

position:fixed;

bottom:25px;
right:25px;

width:70px;
height:70px;

border:none;
border-radius:50%;

background:#ff006e;

color:white;

font-size:28px;

cursor:pointer;

box-shadow:0 0 25px rgba(255,0,110,.8);
}

.lottie{
display:flex;
justify-content:center;
}

</style>

</head>

<body>

<!-- Floating Icons -->

<div class="float f1">❤️</div>
<div class="float f2">🩺</div>
<div class="float f3">💊</div>
<div class="float f4">🧬</div>

<nav>

<div class="logo">
🩺 MediAssist AI
</div>

<div class="nav-right">

<div class="theme" onclick="toggleTheme()">
🌙
</div>

<a href="/logout" class="logout">
Logout
</a>

</div>

</nav>

<div class="container">

<!-- Statistics -->

<div class="stats">

<div class="stat-card" data-aos="fade-up">
<i class="fas fa-users"></i>
<h2>10K+</h2>
<p>Patients</p>
</div>

<div class="stat-card" data-aos="fade-up">
<i class="fas fa-heartbeat"></i>
<h2>95%</h2>
<p>Accuracy</p>
</div>

<div class="stat-card" data-aos="fade-up">
<i class="fas fa-user-md"></i>
<h2>250+</h2>
<p>Doctors</p>
</div>

<div class="stat-card" data-aos="fade-up">
<i class="fas fa-clock"></i>
<h2>24/7</h2>
<p>Support</p>
</div>

</div>

<div class="grid">

<!-- Chatbot -->

<div class="chat-card" data-aos="fade-right">

<h2>🤖 Healthcare Chatbot</h2>

<br>

<div class="chat-box" id="chat-box">

<div class="bot">
Hello! I am MediAssist AI. How can I help you today?
</div>

</div>

<div class="chat-input">

<input
type="text"
id="message"
placeholder="Ask a healthcare question...">

<button onclick="sendMessage()">
Send
</button>

</div>

</div>

<!-- Sidebar -->

<div>

<div class="side-card" data-aos="fade-left">

<h3>💊 Medicine Reminder</h3>

<form action="/add_reminder" method="POST">

<input
type="text"
name="medicine"
placeholder="Medicine Name"
required>

<input
type="time"
name="time"
required>

<button type="submit">
Save Reminder
</button>

</form>

</div>

<div class="side-card" data-aos="fade-left">

<h3>👨‍⚕️ AI Assistant</h3>

<div class="lottie">

<lottie-player
src="https://assets2.lottiefiles.com/packages/lf20_q7yxm4lk.json"
background="transparent"
speed="1"
style="width:250px;height:250px"
loop
autoplay>
</lottie-player>

</div>

</div>

</div>

</div>

</div>

<button class="voice" onclick="startVoice()">
🎤
</button>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>

AOS.init();

function toggleTheme(){
document.body.classList.toggle("light");
}

function sendMessage(){

let input=document.getElementById("message");

let msg=input.value;

if(msg==="") return;

let chat=document.getElementById("chat-box");

chat.innerHTML +=
'<div class="user">'+msg+'</div>';

fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:msg
})

})

.then(response=>response.json())

.then(data=>{

chat.innerHTML +=
'<div class="bot">'+data.response+'</div>';

chat.scrollTop=chat.scrollHeight;

});

input.value="";
}

function startVoice(){

if('webkitSpeechRecognition' in window){

const recognition =
new webkitSpeechRecognition();

recognition.start();

recognition.onresult=function(event){

document.getElementById("message").value =
event.results[0][0].transcript;

};

}

else{

alert("Voice recognition not supported.");

}

}

</script>

</body>
</html>
